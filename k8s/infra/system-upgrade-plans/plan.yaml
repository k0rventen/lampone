# Server plan
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: server-plan
  namespace: system-upgrade
spec:
  version: v1.32.6-k3s1

  concurrency: 1
  cordon: true
  nodeSelector:
    matchExpressions:
      - key: node-role.kubernetes.io/control-plane
        operator: In
        values:
          - "true"
  serviceAccountName: system-upgrade
  upgrade:
    image: rancher/k3s-upgrade@sha256:0c9789e63220bdb9846d0d11f90739702cadfd3d8d28bfd0775fabfee27e47ce

---
# Agent plan
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: agent-plan
  namespace: system-upgrade
spec:
  version: v1.32.6-k3s1

  concurrency: 1
  cordon: true
  nodeSelector:
    matchExpressions:
      - key: node-role.kubernetes.io/control-plane
        operator: DoesNotExist
  prepare:
    args:
      - prepare
      - server-plan
    image: rancher/k3s-upgrade@sha256:0c9789e63220bdb9846d0d11f90739702cadfd3d8d28bfd0775fabfee27e47ce
  serviceAccountName: system-upgrade
  upgrade:
    image: rancher/k3s-upgrade@sha256:0c9789e63220bdb9846d0d11f90739702cadfd3d8d28bfd0775fabfee27e47ce
