# Server plan
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: server-plan
  namespace: system-upgrade
spec:
  version: v1.32.6-k3s1

  concurrency: 1
  cordon: true
  nodeSelector:
    matchExpressions:
      - key: node-role.kubernetes.io/control-plane
        operator: In
        values:
          - "true"
  serviceAccountName: system-upgrade
  upgrade:
    image: rancher/k3s-upgrade@sha256:53d97694cab4604470cfb51abf495f391dd3e0fa3f18a29e038e5821f3d00120

---
# Agent plan
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: agent-plan
  namespace: system-upgrade
spec:
  version: v1.32.6-k3s1

  concurrency: 1
  cordon: true
  nodeSelector:
    matchExpressions:
      - key: node-role.kubernetes.io/control-plane
        operator: DoesNotExist
  prepare:
    args:
      - prepare
      - server-plan
    image: rancher/k3s-upgrade@sha256:53d97694cab4604470cfb51abf495f391dd3e0fa3f18a29e038e5821f3d00120
  serviceAccountName: system-upgrade
  upgrade:
    image: rancher/k3s-upgrade@sha256:53d97694cab4604470cfb51abf495f391dd3e0fa3f18a29e038e5821f3d00120
