apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rathole
spec:
  interval: 24h
  chart:
    spec:
      chart: appchart
      version: 1.8.0
      sourceRef:
        kind: HelmRepository
        name: appchart
        namespace: flux-system
      interval: 1h
  values:
    apps:
      - name: rathole
        image: rapiz1/rathole:v0.5.0
        containerSpec:
          args:
            - --client
            - /client.toml
        volumeMounts:
          - name: rathole-config
            mountPath: /client.toml
            subPath: client.toml
        volumes:
          - name: rathole-config
            secret:
              secretName: rathole-config