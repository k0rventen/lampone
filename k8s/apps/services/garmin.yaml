apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: garmin-grafana
spec:
  type: "oci"
  url: oci://ghcr.io/arpanghosh8453
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: garmin-grafana
spec:
  interval: 10m
  timeout: 5m
  chart:
    spec:
      chart: garmin-grafana
      version: "v0.4.0-helm"
      sourceRef:
        kind: HelmRepository
        name: garmin-grafana
      interval: 1h
  values:
    grafana:
      enabled: false

    influxdb:
      image:
        repository: influxdb
        tag: "2.8@sha256:60676b368409b4ac9664d1ba57b2613c5dec7c1a0f9dcd9405a0be0c375409f5" # renovate: ignore
      persistence:
        enabled: true
        size: 5Gi

    garmin:
      image:
        repository: ghcr.io/arpanghosh8453/garmin-fetch-data
        tag: v0.4.0@sha256:0a41f5e68f9555470e5fe8d97d84e90697777825a89543dc1d501df329358598
      port: 8000
      tokens:
        persistence:
          enabled: true
          size: 100Mi
  valuesFrom:
    - kind: Secret
      name: garmin-config