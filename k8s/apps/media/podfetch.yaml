apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: podfetch
spec:
  interval: 10m
  chart:
    spec:
      chart: appchart
      version: "1.8.0"
      sourceRef:
        kind: HelmRepository
        name: appchart
        namespace: flux-system
      interval: 10m
  values:
    apps:
      - name: podfetch
        image: ghcr.io/samtv12345/podfetch:v5.0.1@sha256:ce492a18c9bf6cc6b286c6bdb65a20618fb93b97b0f2446faee8731eb0bcae93
        env:
        - name: POLLING_INTERVAL
          value: "3600"
        - name: DATABASE_URL
          value: sqlite:///app/db/podcast.db

        service: 8000
        ingress:
          domain: podfetch.cocointhe.cloud
        volumeMounts:
          - name: podfetch-db
            mountPath: /app/db
          - name: jellyfin-music
            mountPath: /app/podcasts
        volumes:
          - name: podfetch-db
            persistentVolumeClaim:
              claimName: podfetch-db
          - name: jellyfin-music
            persistentVolumeClaim:
              claimName: jellyfin-music
        pvc:
        - podfetch-db
