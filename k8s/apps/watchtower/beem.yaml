apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: beem-exporter
spec:
  interval: 10m
  chart:
    spec:
      chart: appchart
      version: "1.8.0"
      sourceRef:
        kind: HelmRepository
        name: appchart
        namespace: flux-system
      interval: 10m
  values:
    apps:
      - name: beem-exporter
        image: gitea.cocointhe.cloud/coco/beem-exporter:v0.2.1
        service: 8000
        env:
          - name: EMAIL
            valueFrom:
              secretKeyRef:
                name: beem-exporter-secret
                key: email
          - name: PASSWORD
            valueFrom:
              secretKeyRef:
                name: beem-exporter-secret
                key: password
